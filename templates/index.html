{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="chat-wrapper">

    <!-- ================= HEADER ================= -->
    <header class="chat-header">
        <i class="fa-solid fa-robot"></i>
        <h2>AI Chatbot</h2>
    </header>

    <!-- ================= CHAT BOX ================= -->
    <main id="chat-box" class="chat-box"></main>

    <!-- ================= INPUT AREA ================= -->
    <section class="chat-input-area">

        <!-- LEFT ACTIONS -->
        <div class="input-actions">

            <!-- IMAGE UPLOAD -->
            <label class="icon-btn">
                <i class="fa-solid fa-image"></i>
                <input type="file" id="imageInput" hidden>
            </label>

            <!-- PDF UPLOAD -->
           <label class="icon-btn">
                <i class="fa-solid fa-file-pdf"></i>
                <input type="file" id="pdfInput" hidden onchange="uploadPDF()">
            </label>


        </div>

        <!-- TEXT INPUT -->
        <input
            type="text"
            id="message"
            placeholder="Type your message..."
            autocomplete="off"
        >

        <!-- RIGHT ACTIONS -->
        <div class="input-actions">

            <!-- VOICE -->
            <button id="mic-btn" class="icon-btn voice-btn">
                <i class="fa-solid fa-microphone-lines" style="color:white;"></i>
            </button>

            <!-- SEND -->
            <button onclick="sendMessage()" class="send-btn">
                <i class="fa-solid fa-paper-plane" style="color:white;"></i>
            </button>

        </div>

    </section>

</div>

<script src="{% static 'js/app.js' %}"></script>

</body>
</html>
