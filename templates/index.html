{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="chat-wrapper">

        <!-- HEADER -->
        <header class="chat-header">
            <i class="fa-solid fa-robot"></i>
            <h2>AI Chatbot</h2>
        </header>

        <!-- CHAT AREA -->
        <main id="chat-box" class="chat-box"></main>

        <!-- INPUT AREA -->
        <section class="chat-input-area">

            <!-- IMAGE UPLOAD -->
            <label class="icon-btn">
                <i class="fa-solid fa-image"></i>
                <input type="file" id="imageInput" hidden>
            </label>

            <!-- TEXT INPUT -->
            <input
                type="text"
                id="message"
                placeholder="Type your message..."
                autocomplete="off"
            >

            <!-- VOICE BUTTON (PROFESSIONAL ICON) -->
            <button id="mic-btn" class="icon-btn voice-btn">
                <i class="fa-solid fa-microphone-lines" style="color:white;"></i>
            </button>

            <!-- SEND BUTTON -->
            <button onclick="sendMessage()" class="send-btn">
                <i class="fa-solid fa-paper-plane" style="color:white;"></i>
            </button>

        </section>

    </div>

    <script src="{% static 'js/app.js' %}"></script>

</body>
</html>
